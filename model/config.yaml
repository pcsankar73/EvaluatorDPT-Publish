model_name: bert-base-uncased
max_sequence_length: 128
batch_size: 32
primary_labels: [YES, NO, TBD]
auxiliary_outputs:
  human_values:
    type: multi_label
    size: 10
  emotion_sentiment:
    type: multi_label
    size: 28
evaluation:
  test_split_size: 22748
  metrics: [accuracy, macro_f1, micro_f1, weighted_f1]
latency:
  p50_ms: 200
  p95_ms: 415
disclosure:
  proprietary_details_included: false
